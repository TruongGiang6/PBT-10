<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="weather-app">
    <h2>Dự báo thời tiết</h2>
    
    <div class="search-box">
        <input type="text" id="cityInput" placeholder="Nhập tên thành phố (vd: Hanoi, Tokyo)...">
        <button id="searchBtn"><i class="fa-solid fa-magnifying-glass"></i> Tìm</button>
    </div>
    <div class="history-container" id="historyContainer">
        </div>

    <div id="weatherState" class="weather-state">
        <p class="placeholder-text">Hãy nhập tên thành phố để xem thời tiết.</p>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
